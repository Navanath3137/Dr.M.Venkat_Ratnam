name: Update Google Scholar Stats

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch: # Allows manual trigger

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install cheerio axios

      - name: Scrape Scholar
        run: |
          node -e '
          const axios = require("axios");
          const cheerio = require("cheerio");
          const fs = require("fs");

          async function scrape() {
            try {
              const url = "https://scholar.google.com/citations?user=eLx3sMcAAAAJ&hl=en";
              const { data } = await axios.get(url, {
                headers: {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
                }
              });
              const $ = cheerio.load(data);
              const stats = $(".gsc_rsb_std").map((i, el) => $(el).text()).get();
              
              const scholarData = {
                citations: stats[0] || "10,000+",
                hIndex: stats[2] || "75",
                i10Index: stats[4] || "300+",
                lastUpdated: new Date().toISOString().split("T")[0]
              };
              
              fs.writeFileSync("src/data/scholar.json", JSON.stringify(scholarData, null, 2));
              console.log("Updated stats:", scholarData);
            } catch (err) {
              console.error("Scraping failed:", err.message);
              process.exit(1);
            }
          }
          scrape();
          '

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/scholar.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update Google Scholar stats" && git push)
